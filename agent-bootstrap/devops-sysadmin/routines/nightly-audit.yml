# IronClaw routine: nightly audit of skill health, memory hygiene, and EvoLoop
# cycle delta. Runs 22:30 AEST on every fleet node.

name: nightly-audit
schedule:
  cron: "30 22 * * *"
  timezone: Australia/Melbourne
require:
  host_in_fleet: true
  skills:
    - devops-sysadmin
    - memory-hygiene
    - ironclaw-orchestrator
capability_tier: read_only
timeout: 10m
evidence:
  dir: session-handoffs/evidence
  filename: "{node}-nightly-{YYYYMMDD}.jsonl"
mem0:
  app_id: cursor-global-kb
  tags: [evoloop:cycle, skill:devops-sysadmin, nightly-audit, node:{node}]

steps:
  - name: doctor
    run: scripts/preflight.sh --verbose
    capture_stdout: "{evidence_path}"
  - name: evoloop-delta
    tool: evoloop:query
    input:
      window: 24h
      labels:
        node: "{node}"
  - name: mem0-hygiene
    tool: memory-hygiene:audit
    input:
      scope: node
      dry_run: true
  - name: disk-vram-report
    run: scripts/disk-vram-report.sh
  - name: summarise
    tool: mem0:add_memory
    input:
      summary: "nightly audit {node} -- cycles={evoloop_delta_count} self_heal={self_heal_count} drift={ansible_drift_count}"
      tags: [evoloop:cycle, skill:devops-sysadmin, nightly-audit, node:{node}]
  - name: cycle
    tool: evoloop:publish
    input:
      machine: "{node}"
      skill: devops-sysadmin
      outcome: "{audit_outcome}"
