# IronClaw routine: 08:00 AEST daily fleet digest.
#
# Dispatches the cmd/fleet-daily-report Go binary (Sprint 3 Day 9, v250). The
# binary aggregates MiniMax tokens, per-provider email counters, EvoLoop
# cycles + KPI, drift/doctor pass-rates, and commits-by-repo, then sends a
# multipart HTML + plaintext email to info@oztac.com.au (Cc jaslian@gmail.com)
# and posts a compact plaintext digest to the mission-control Telegram
# bridge.
#
# Owner: WSL1 (primary). Other fleet nodes can optionally run this routine in
# read-only mode for evidence, but only WSL1 should emit the canonical digest
# to avoid duplicate email/Telegram noise.

name: daily-report
schedule:
  cron: "0 8 * * *"
  timezone: Australia/Melbourne
require:
  host_in_fleet: true
  host_labels:
    role: primary   # canonical sender; other nodes skip the dispatch step.
  skills:
    - devops-sysadmin
    - ironclaw-external-ops
capability_tier: read_only
timeout: 5m
evidence:
  dir: session-handoffs/evidence
  filename: "daily-report-{YYYYMMDD}.log"
mem0:
  app_id: cursor-global-kb
  tags:
    - "evoloop:cycle"
    - "skill:devops-sysadmin"
    - "daily-report"
    - "node:{node}"
steps:
  - name: preflight
    run: scripts/preflight.sh
  - name: dispatch
    # cmd/fleet-daily-report lives in ai-agent-business-stack/go. The routine
    # runner is expected to have FLEET_REPORT_* and NOTIFY_* env configured
    # via the 1Password service-account token (Sprint 1 Day 2 wiring).
    run: bash -lc 'cd $HOME/ai-agent-business-stack/go && go run ./cmd/fleet-daily-report'
    capture_stdout: "{evidence_path}"
    allowed_exit_codes: [0]
  - name: summarise
    tool: mem0:add_memory
    input:
      summary: "daily fleet digest emitted 08:00 AEST to info@oztac.com.au cc jaslian@gmail.com + mc Telegram"
      content: "{evidence_path}"
  - name: cycle
    tool: evoloop:publish
    input:
      machine: "{node}"
      skill: devops-sysadmin
      outcome: "{daily_report_outcome}"  # improved | steady | regressed
on_failure:
  - name: telegram-escalate
    tool: telegram:digest
    input:
      scope: mission-control
      level: warning
      message: "daily-report failed on {node}: {error}"
  - name: evoloop-regression
    tool: evoloop:publish
    input:
      machine: "{node}"
      skill: devops-sysadmin
      outcome: regressed
