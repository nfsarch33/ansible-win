# IronClaw routine: morning Ansible --check --diff drift audit per ADR-014.
# Executed by the IronClaw routine runner on each fleet node at 08:00 AEST.
# Output lands in session-handoffs/evidence/<node>-drift-YYYYMMDD.txt and is
# summarised into Mem0 with tag ansible:drift.
#
# This is a thin routine file; the real work is in
# ~/Code/global-kb/scripts/fleet/ansible-check.sh (ADR-014 pilot).

name: morning-drift
schedule:
  cron: "0 8 * * *"
  timezone: Australia/Melbourne
require:
  host_in_fleet: true
  skills:
    - devops-sysadmin
    - ironclaw-external-ops
capability_tier: read_only
timeout: 20m
evidence:
  dir: session-handoffs/evidence
  filename: "{node}-drift-{YYYYMMDD}.txt"
mem0:
  app_id: cursor-global-kb
  tags:
    - "evoloop:cycle"
    - "skill:devops-sysadmin"
    - "ansible:drift"
    - "node:{node}"
steps:
  - name: preflight
    run: scripts/preflight.sh
  - name: ansible-check
    # scripts/fleet/ansible-check.sh in ~/Code/global-kb takes the node as a
    # positional arg; it always runs ansible-playbook --check --diff per ADR-014.
    run: bash $HOME/Code/global-kb/scripts/fleet/ansible-check.sh {node}
    capture_stdout: "{evidence_path}"
    allowed_exit_codes: [0, 2]   # 0 = no drift, 2 = drift detected (non-fatal)
  - name: summarise
    tool: mem0:add_memory
    input:
      summary: "morning drift for {node}: {ansible_check_summary}"
      content: "{evidence_path}"
  - name: cycle
    tool: evoloop:publish
    input:
      machine: "{node}"
      skill: devops-sysadmin
      outcome: "{ansible_check_outcome}"  # improved | steady | regressed
on_failure:
  - name: telegram-escalate
    tool: telegram:digest
    input:
      scope: mission-control
      level: warning
      message: "morning-drift failed on {node}: {error}"
  - name: evoloop-regression
    tool: evoloop:publish
    input:
      machine: "{node}"
      skill: devops-sysadmin
      outcome: regressed
