# IronClaw routine: Telegram mission-control liveness + per-node fallback bot
# promotion. Runs every 3 minutes on every fleet node; only promotes fallback
# after 3 consecutive failures and then only for 30 minutes.
#
# Fallback bot scope is read-only + restart + evoloop status (enforced by
# ironclaw-mission-control policy; this routine only owns the switchover).

name: telegram-health
schedule:
  interval: 3m
require:
  host_in_fleet: true
  skills:
    - devops-sysadmin
    - ironclaw-mission-control
capability_tier: read_only
timeout: 30s
mem0:
  app_id: cursor-global-kb
  tags: [skill:devops-sysadmin, telegram:health, node:{node}]

steps:
  - name: mc-ping
    tool: telegram:ping
    input:
      bot: mc_sysadmin_bot
      timeout_ms: 3000
    allowed_exit_codes: [0, 1]
  - name: update-streak
    run: scripts/mc-streak.sh
    args: ["--update", "{mc_ping_ok}"]
  - name: decide
    condition: "{mc_fail_streak} >= 3 and {fallback_active} == false"
    tool: telegram:promote_fallback
    input:
      bot: "{node}_sysadmin_fallback_bot"
      duration: 30m
      scope: [read_only, restart, evoloop_status]
    on_success:
      - tool: mem0:add_memory
        input:
          summary: "telegram fallback promoted on {node} (mc_fail_streak=3)"
          tags: [evoloop:cycle, skill:devops-sysadmin, telegram:fallback]
  - name: demote-on-recovery
    condition: "{mc_ping_ok} == true and {fallback_active} == true and {fallback_expiry_passed} == true"
    tool: telegram:demote_fallback
    input:
      bot: "{node}_sysadmin_fallback_bot"
    on_success:
      - tool: mem0:add_memory
        input:
          summary: "telegram fallback demoted on {node} (mc recovered)"
          tags: [evoloop:cycle, skill:devops-sysadmin, telegram:fallback]
