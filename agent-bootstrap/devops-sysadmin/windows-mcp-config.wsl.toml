# IronClaw MCP client config for WSL bridge. The agent runs uvx windows-mcp
# on the Windows host by dialling powershell.exe as a subprocess; the TOML
# entry lives under $HOME/.ironclaw/config.d/ on WSL so WSL-side Cursor can
# reach the Windows host's MCP surface without opening a TCP port.
# Managed by skills/devops-sysadmin/install.sh (ADR-015).
# Pinned to windows-mcp 0.7.1; bump via WINDOWS_MCP_VERSION and re-run install.sh.

[mcp.windows-mcp]
transport = "stdio"
command = "powershell.exe"
version = "0.7.1"
args = [
    "-NoLogo",
    "-NonInteractive",
    "-Command",
    "uvx windows-mcp@0.7.1"
]

[mcp.windows-mcp.env]
ANONYMIZED_TELEMETRY = "false"
WINDOWS_MCP_SCREENSHOT_SCALE = "0.5"
WINDOWS_MCP_SCREENSHOT_BACKEND = "auto"

[mcp.windows-mcp.allowed_tools]
read = [
    "App", "Process", "Screenshot", "Snapshot",
    "Clipboard", "FileSystem", "Registry"
]
control = [
    "PowerShell", "Click", "Type", "Scroll", "Move",
    "Shortcut", "Wait", "MultiSelect", "MultiEdit",
    "Notification", "Scrape", "FileSystem"
]
gated = [
    "Registry",
    "Process",
    "FileSystem"
]
