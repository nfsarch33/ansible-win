# Prometheus recording + alerting rules for the devops-sysadmin skill.
#
# Scrape expectations:
#   - evoloop-daemon on wsl1:9301/metrics (from Day 0)
#   - llm-cluster-router on wsl1:9090 (existing)
#   - Windows node_exporter + gpu_exporter on each fleet node
#   - IronClaw orchestrator on each node (exports devops-sysadmin activation
#     + routine metrics via :2112/metrics)
#
# Install: loaded by cluster-monitoring skill's Prometheus stack via
# include_files glob on telemetry/prom-rules.yml.

groups:
  - name: devops-sysadmin.recording
    interval: 30s
    rules:
      - record: devops_sysadmin:activation_rate_1h
        expr: sum by (node) (rate(ironclaw_skill_activation_total{skill="devops-sysadmin"}[1h]))
      - record: devops_sysadmin:cycle_rate_15m
        expr: sum by (node, outcome) (rate(evoloop_cycles_total{skill="devops-sysadmin"}[15m]))
      - record: devops_sysadmin:windows_mcp_probe_success_ratio_5m
        expr: |
          sum(rate(devops_sysadmin_windows_mcp_probe_total{result="ok"}[5m]))
            /
          clamp_min(sum(rate(devops_sysadmin_windows_mcp_probe_total[5m])), 1)
      - record: devops_sysadmin:routine_runtime_p95_30m
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, routine) (
              rate(devops_sysadmin_routine_duration_seconds_bucket[30m])
            )
          )
      - record: devops_sysadmin:self_heal_rate_1h
        expr: sum by (symptom) (rate(devops_sysadmin_self_heal_total[1h]))
      - record: devops_sysadmin:router_tier_p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, tier) (
              rate(llm_cluster_router_request_duration_seconds_bucket[5m])
            )
          )
      - record: devops_sysadmin:gpu_vram_used_ratio
        expr: |
          nvidia_gpu_memory_used_bytes
            /
          clamp_min(nvidia_gpu_memory_total_bytes, 1)
      - record: devops_sysadmin:physical_memory_used_ratio
        expr: |
          windows_physical_memory_used_bytes
            /
          clamp_min(windows_physical_memory_total_bytes, 1)
      - record: devops_sysadmin:free_disk_ratio
        expr: |
          windows_free_disk_bytes
            /
          clamp_min(windows_total_disk_bytes, 1)
      - record: devops_sysadmin:llm_failover_rate_5m
        expr: sum by (from_tier, to_tier, reason) (rate(fleet_llm_failover_total[5m]))
      - record: devops_sysadmin:costguard_spend_usd_daily
        expr: max by (node, provider) (devops_sysadmin_costguard_daily_spend_usd)

  - name: devops-sysadmin.alerting
    rules:
      - alert: DevOpsSysAdminActivationNoise
        expr: devops_sysadmin:activation_rate_1h > 0.5
        for: 30m
        labels:
          severity: warning
          skill: devops-sysadmin
        annotations:
          summary: "devops-sysadmin activating on >= 50% of prompts for 30 min on {{ $labels.node }}"
          runbook_url: "https://github.com/nfsarch33/ai-agent-business-stack/tree/main/docs/adr/adr-015-devops-sysadmin-skill.md"

      - alert: DevOpsSysAdminWindowsMCPProbeDegraded
        expr: devops_sysadmin:windows_mcp_probe_success_ratio_5m < 0.95
        for: 10m
        labels:
          severity: warning
          skill: devops-sysadmin
        annotations:
          summary: "Windows-MCP probe success < 95% on {{ $labels.node }} for 10 min"

      - alert: DevOpsSysAdminRoutineSlow
        expr: devops_sysadmin:routine_runtime_p95_30m > 120
        for: 15m
        labels:
          severity: warning
          skill: devops-sysadmin
        annotations:
          summary: "devops-sysadmin routine {{ $labels.routine }} p95 > 120s for 15 min"

      - alert: DevOpsSysAdminGPUVRAMHigh
        expr: devops_sysadmin:gpu_vram_used_ratio > 0.90
        for: 5m
        labels:
          severity: warning
          skill: devops-sysadmin
        annotations:
          summary: "GPU VRAM > 90% on {{ $labels.node }}:{{ $labels.gpu }} for 5 min; router should demote tier"

      - alert: DevOpsSysAdminGPUThermalThrottle
        expr: nvidia_gpu_temperature_celsius > 85
        for: 30s
        labels:
          severity: critical
          skill: devops-sysadmin
        annotations:
          summary: "GPU temp > 85C on {{ $labels.node }}:{{ $labels.gpu }} for 30s; pause Tier 2/3 jobs"

      - alert: DevOpsSysAdminDiskLow
        expr: (node_filesystem_avail_bytes{mountpoint!~"/boot.*|/run.*|/snap.*"} / node_filesystem_size_bytes{mountpoint!~"/boot.*|/run.*|/snap.*"}) < 0.10
        for: 10m
        labels:
          severity: warning
          skill: devops-sysadmin
        annotations:
          summary: "Free disk < 10% on {{ $labels.node }}:{{ $labels.mountpoint }}"

      - alert: DevOpsSysAdminRouterTierSlow
        expr: devops_sysadmin:router_tier_p95_5m > 30
        for: 10m
        labels:
          severity: warning
          skill: devops-sysadmin
        annotations:
          summary: "llm-cluster-router tier {{ $labels.tier }} p95 > 30s for 10 min"

      - alert: DevOpsSysAdminSelfHealSpike
        expr: devops_sysadmin:self_heal_rate_1h > 6
        for: 15m
        labels:
          severity: warning
          skill: devops-sysadmin
        annotations:
          summary: "devops-sysadmin self-heal rate > 6/h for 15 min (symptom={{ $labels.symptom }})"

      # Sprint 1 Day 3 resource-aware guardrails (plan L170).
      # Matches the guardrail keys declared in skills/devops-sysadmin/llm-tiers.yaml;
      # breaches MUST demote the affected tier via the router.

      - alert: DevOpsSysAdminCostGuardApproaching
        expr: devops_sysadmin:costguard_spend_usd_daily > 3.5
        for: 5m
        labels:
          severity: warning
          skill: devops-sysadmin
          guardrail: costguard_daily_usd_max
        annotations:
          summary: "Daily paid LLM spend > $3.50 on {{ $labels.node }}:{{ $labels.provider }} (T1 cap=$5)"
          description: "Approach the costguard_daily_usd_max=5.0 threshold for T1 MiniMax-M2.7-highspeed; prefer T2/T3 local vLLM for non-planning workloads until 00:00 UTC rollover."
          runbook_url: "https://github.com/nfsarch33/ai-agent-business-stack/tree/main/docs/adr/adr-015-devops-sysadmin-skill.md#7-minimax-model-name-drift-and-llm-tier-routing-sprint-1-day-3"

      - alert: DevOpsSysAdminCostGuardBreached
        expr: devops_sysadmin:costguard_spend_usd_daily > 5.0
        for: 1m
        labels:
          severity: critical
          skill: devops-sysadmin
          guardrail: costguard_daily_usd_max
        annotations:
          summary: "Daily paid LLM spend > $5 on {{ $labels.node }}:{{ $labels.provider }}; T1/T5 must be demoted"
          runbook_url: "https://github.com/nfsarch33/ai-agent-business-stack/tree/main/docs/adr/adr-015-devops-sysadmin-skill.md#7-minimax-model-name-drift-and-llm-tier-routing-sprint-1-day-3"

      - alert: DevOpsSysAdminPhysicalMemoryHigh
        expr: devops_sysadmin:physical_memory_used_ratio > 0.85
        for: 5m
        labels:
          severity: warning
          skill: devops-sysadmin
          guardrail: physical_memory_used_ratio_max
        annotations:
          summary: "Physical memory > 85% on {{ $labels.node }} for 5 min; demote local-vLLM tier routing"
          description: "windows_physical_memory_used_bytes / windows_physical_memory_total_bytes exceeded 0.85; matches llm-tiers.yaml guardrail physical_memory_used_ratio_max for T2/T3."
          runbook_url: "https://github.com/nfsarch33/ai-agent-business-stack/tree/main/docs/adr/adr-015-devops-sysadmin-skill.md#7-minimax-model-name-drift-and-llm-tier-routing-sprint-1-day-3"

      - alert: DevOpsSysAdminLLMFailoverChurn
        expr: sum by (from_tier, to_tier) (devops_sysadmin:llm_failover_rate_5m) > 0.5
        for: 10m
        labels:
          severity: warning
          skill: devops-sysadmin
          guardrail: failover_churn
        annotations:
          summary: "LLM tier failover {{ $labels.from_tier }}->{{ $labels.to_tier }} churning > 0.5 req/s for 10 min"
          description: "Sustained failover indicates an unhealthy upstream tier. Check GPU VRAM, circuit breaker state, and MiniMax 429 rate before raising limits."
          runbook_url: "https://github.com/nfsarch33/ai-agent-business-stack/tree/main/docs/adr/adr-015-devops-sysadmin-skill.md#7-minimax-model-name-drift-and-llm-tier-routing-sprint-1-day-3"

      - alert: DevOpsSysAdminGuardrailMetricMissing
        expr: |
          absent(devops_sysadmin:gpu_vram_used_ratio)
          or absent(devops_sysadmin:physical_memory_used_ratio)
          or absent(devops_sysadmin:free_disk_ratio)
          or absent(fleet_llm_failover_total)
        for: 10m
        labels:
          severity: warning
          skill: devops-sysadmin
          guardrail: metric_absence
        annotations:
          summary: "devops-sysadmin guardrail metric missing on {{ $labels.node }}; router must fail closed"
          description: "One of the guardrail metrics declared in skills/devops-sysadmin/llm-tiers.yaml:declared_metrics is absent from Prometheus for 10 min. Router demotes affected tier until the exporter recovers."
          runbook_url: "https://github.com/nfsarch33/ai-agent-business-stack/tree/main/docs/adr/adr-015-devops-sysadmin-skill.md#7-minimax-model-name-drift-and-llm-tier-routing-sprint-1-day-3"
