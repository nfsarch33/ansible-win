---
- name: Validate DevOps/SysAdmin bootstrap parity paths
  hosts: localhost
  gather_facts: false
  vars:
    ansible_win_bundle: "{{ playbook_dir }}/../../agent-bootstrap/devops-sysadmin"
    legacy_bundle: "{{ lookup('env', 'LEGACY_DEVOPS_SYSADMIN_BUNDLE') | default('', true) }}"
    current_windows_facts: "{{ lookup('env', 'CURRENT_WINDOWS_FACTS') | default('', true) }}"
    legacy_windows_facts: "{{ lookup('env', 'LEGACY_WINDOWS_FACTS') | default('', true) }}"
  tasks:
    - name: Ensure ansible-win bundle exists
      ansible.builtin.stat:
        path: "{{ ansible_win_bundle }}/install.sh"
      register: ansible_win_install

    - name: Fail when ansible-win bundle is missing
      ansible.builtin.fail:
        msg: "ansible-win DevOps/SysAdmin bundle is missing install.sh"
      when: not ansible_win_install.stat.exists

    - name: Skip legacy parity when legacy path is not provided
      ansible.builtin.debug:
        msg: "LEGACY_DEVOPS_SYSADMIN_BUNDLE not set; ansible-win bundle checked only"
      when: legacy_bundle == ""

    - name: Ensure legacy bundle exists when provided
      ansible.builtin.stat:
        path: "{{ legacy_bundle }}/install.sh"
      register: legacy_install
      when: legacy_bundle != ""

    - name: Fail when provided legacy bundle is missing
      ansible.builtin.fail:
        msg: "legacy DevOps/SysAdmin bundle is missing install.sh"
      when: legacy_bundle != "" and not legacy_install.stat.exists

    - name: Compare required top-level bootstrap files
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            from pathlib import Path
            import os, sys
            current = Path(os.environ["CURRENT"])
            legacy = Path(os.environ["LEGACY"])
            required = ["install.sh", "install.ps1", "SKILL.md", "windows-mcp-config.json", "windows-mcp-config.wsl.toml"]
            missing = []
            for name in required:
                if not (current / name).exists():
                    missing.append(f"current:{name}")
                if legacy and not (legacy / name).exists():
                    missing.append(f"legacy:{name}")
            if missing:
                print("\\n".join(missing))
                sys.exit(1)
        chdir: "{{ ansible_win_bundle }}"
      environment:
        CURRENT: "{{ ansible_win_bundle }}"
        LEGACY: "{{ legacy_bundle }}"
      when: legacy_bundle != ""
      changed_when: false

    - name: Compare Windows fact snapshots when provided
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import json
            import os
            import sys
            from pathlib import Path

            current = json.loads(Path(os.environ["CURRENT_WINDOWS_FACTS"]).read_text(encoding="utf-8"))
            legacy = json.loads(Path(os.environ["LEGACY_WINDOWS_FACTS"]).read_text(encoding="utf-8"))
            keys = ["hostname", "os_family", "windows_mcp_version", "wsl_distro", "tailscale_status"]
            windows_fact_mismatches = [
                f"{key}: current={current.get(key)!r} legacy={legacy.get(key)!r}"
                for key in keys
                if current.get(key) != legacy.get(key)
            ]
            if windows_fact_mismatches:
                print("\n".join(windows_fact_mismatches))
                sys.exit(1)
        chdir: "{{ ansible_win_bundle }}"
      environment:
        CURRENT_WINDOWS_FACTS: "{{ current_windows_facts }}"
        LEGACY_WINDOWS_FACTS: "{{ legacy_windows_facts }}"
      when: current_windows_facts != "" and legacy_windows_facts != ""
      changed_when: false
